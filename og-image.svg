  </g>

  <!-- Title -->
  <text x="600" y="455" text-anchor="middle" font-family="monospace,sans-serif" font-size="68" font-weight="bold" fill="#8ac4ff" letter-spacing="10">NEBULA</text>
  <text x="600" y="490" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#556688" letter-spacing="5">SPACE SHOOTER</text>
