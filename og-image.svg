  <!-- Spaceship -->
  <g transform="translate(600, 250)">
    <ellipse cx="0" cy="40" rx="28" ry="35" fill="#4a9eff" opacity="0.1"/>
    <polygon points="0,-55 -32,28 0,12 32,28" fill="#8ac4ff"/>
    <polygon points="0,-55 -32,28 0,12 32,28" fill="#b0d8ff" opacity="0.4"/>
    <polygon points="0,-40 -20,20 0,8 20,20" fill="#cce0ff" opacity="0.3"/>
